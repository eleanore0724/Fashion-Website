<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重設密碼</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .reset-container {
      max-width: 500px;
      margin: 50px auto;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    
    .reset-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .reset-title {
      font-size: 2rem;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    
    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .field {
      display: flex;
      flex-direction: column;
    }
    
    .field label {
      font-weight: 500;
      margin-bottom: 8px;
      color: #2c3e50;
    }
    
    .field input {
      padding: 12px;
      border: 2px solid #e1e8ed;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    
    .field input:focus {
      outline: none;
      border-color: #3498db;
    }
    
    .field input.error {
      border-color: #e74c3c;
    }
    
    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 5px;
      display: none;
    }
    
    .primary-btn {
      background: #3498db;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .primary-btn:hover {
      background: #2980b9;
    }
    
    .primary-btn:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #3498db;
      text-decoration: none;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="reset-container">
    <header class="reset-header">
      <h1 class="reset-title">重設密碼</h1>
      <p>請輸入您的新密碼</p>
    </header>

    <form id="reset-form" class="reset-form" novalidate>
      <div class="field">
        <label for="new-password">新密碼</label>
        <input id="new-password" name="newPassword" type="password" placeholder="至少 6 碼" minlength="6" required>
        <p class="error" data-error-for="new-password"></p>
      </div>

      <div class="field">
        <label for="confirm-password">確認新密碼</label>
        <input id="confirm-password" name="confirmPassword" type="password" placeholder="再次輸入新密碼" minlength="6" required>
        <p class="error" data-error-for="confirm-password"></p>
      </div>

      <button type="submit" class="primary-btn">重設密碼</button>
    </form>

    <div class="back-link">
      <a href="index.html">返回登入頁面</a>
    </div>
  </main>

  <template id="toast-template">
    <div class="toast" role="status" aria-live="polite"></div>
  </template>

  <script>
    // 表單驗證與提交功能
    function showError(input, message) {
      const id = input.getAttribute('id');
      const errorEl = document.querySelector(`[data-error-for="${id}"]`);
      if (errorEl) {
        errorEl.textContent = message || '';
        errorEl.style.display = message ? 'block' : 'none';
      }
      
      if (message) {
        input.classList.add('error');
      } else {
        input.classList.remove('error');
      }
    }

    function clearErrors(form) {
      Array.from(form.querySelectorAll('.error')).forEach(el => {
        el.textContent = '';
        el.style.display = 'none';
      });
      
      Array.from(form.querySelectorAll('input')).forEach(input => {
        input.classList.remove('error');
      });
    }

    function toast(message) {
      const t = document.getElementById('toast-template');
      if (!t) return;
      const el = t.content.firstElementChild.cloneNode(true);
      el.textContent = message;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    // 獲取URL參數
    function getUrlParameter(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 表單提交處理
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const form = e.currentTarget;
      clearErrors(form);
      
      const token = getUrlParameter('token');
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      
      let hasErrors = false;
      
      if (!token) {
        toast('無效的重設連結');
        return;
      }
      
      if (!newPassword || newPassword.length < 6) {
        showError(document.getElementById('new-password'), '密碼至少需要6個字元');
        hasErrors = true;
      }
      
      if (!confirmPassword) {
        showError(document.getElementById('confirm-password'), '請確認密碼');
        hasErrors = true;
      } else if (newPassword !== confirmPassword) {
        showError(document.getElementById('confirm-password'), '兩次密碼不一致');
        hasErrors = true;
      }
      
      if (hasErrors) {
        toast('請修正表單中的錯誤');
        return;
      }
      
      // 提交重設密碼請求
      const submitBtn = document.querySelector('.primary-btn');
      const originalText = submitBtn.textContent;
      
      submitBtn.disabled = true;
      submitBtn.textContent = '重設中...';
      
      try {
        const response = await fetch('http://localhost:8080/api/auth/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            token: token,
            newPassword: newPassword
          })
        });
        
        const result = await response.json();
        
        if (result.success) {
          toast('密碼重設成功！正在跳轉到登入頁面...');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        } else {
          toast(result.message || '重設失敗');
        }
      } catch (error) {
        console.error('重設密碼錯誤:', error);
        toast('重設失敗，請稍後再試');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });

    // 頁面載入時檢查令牌
    document.addEventListener('DOMContentLoaded', () => {
      const token = getUrlParameter('token');
      if (!token) {
        toast('無效的重設連結');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      }
    });
  </script>
</body>
</html>
