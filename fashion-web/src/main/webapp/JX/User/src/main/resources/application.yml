server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: fashion-member-system
  
  # 資料庫配置
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  
  # H2 Console (開發環境)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # 郵件配置
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT配置
jwt:
  secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
  expiration: 86400000 # 24小時 (毫秒)

# 應用程式配置
app:
  frontend-url: http://localhost:3000
  reset-password-url: http://localhost:3000/reset-password

# 日誌配置
logging:
  level:
    com.fashion: DEBUG
    org.springframework.security: DEBUG
